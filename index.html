<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));
    </script>
    <link rel="icon" type="image/png" href="/IStudio_icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leyin & Risa's Wedding!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Noto+Sans+TC&display=swap" rel="stylesheet" />
    <style>
      #loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #FDFAF4;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        transition: opacity 0.7s ease, visibility 0.7s ease;
      }
      #loading.done {
        opacity: 0;
        visibility: hidden;
      }
      .ld-ring {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 2px solid #e8dfc8;
        border-top-color: #D4B87A;
        animation: ld-spin 1s linear infinite;
      }
      .ld-monogram {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 2rem;
        letter-spacing: 0.2em;
        color: #6E8F3C;
      }
      .ld-sub {
        font-family: 'Noto Sans TC', sans-serif;
        font-size: 0.75rem;
        letter-spacing: 0.35em;
        color: #D4B87A;
      }
      .ld-dots {
        display: flex;
        gap: 6px;
      }
      .ld-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #B1C97A;
        animation: ld-pulse 1.4s ease-in-out infinite;
      }
      .ld-dots span:nth-child(2) { animation-delay: 0.2s; }
      .ld-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes ld-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes ld-pulse {
        0%, 80%, 100% { transform: scale(0.5); opacity: 0.35; }
        40%            { transform: scale(1);   opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="ld-ring"></div>
      <div class="ld-monogram">L &amp; R</div>
      <div class="ld-sub">宗毅 · 怡雯</div>
      <div class="ld-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
